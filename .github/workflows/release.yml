name: Build and Release AAR

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK
      uses: actions/setup-java@v3
      with:
        distribution: "zulu"
        java-version: "17"

    - name: Set up Gradle
      uses: gradle/gradle-build-action@v2

    - name: Build AAR
      run: ./gradlew :shortmesh-ui:assembleRelease

    - name: Upload AAR to GitHub Releases
      uses: actions/upload-release-asset@v1
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: shortmesh-ui/build/outputs/aar/shortmesh-ui-release.aar
        asset_name: shortmesh-ui-release.aar
        asset_content_type: application/java-archive
